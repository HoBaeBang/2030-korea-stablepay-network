<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px Arial, sans-serif; fill: #334155; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">SPN-20 Day 3 Learning Flow</text>
  
      
  <rect x="50" y="110" width="240" height="130" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="170" y="142" text-anchor="middle" class="title">1. 개념 학습</text>
  <text x="170" y="172" text-anchor="middle" class="body">Deposit / Withdrawal</text>
<text x="170" y="194" text-anchor="middle" class="body">Wallet / Key Security</text>
      
  <rect x="330" y="110" width="240" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="142" text-anchor="middle" class="title">2. 차이 정리</text>
  <text x="450" y="172" text-anchor="middle" class="body">들어오는 자산</text>
<text x="450" y="194" text-anchor="middle" class="body">나가는 자산</text>
      
  <rect x="610" y="110" width="240" height="130" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="730" y="142" text-anchor="middle" class="title">3. 보안 경계</text>
  <text x="730" y="172" text-anchor="middle" class="body">Private Key</text>
<text x="730" y="194" text-anchor="middle" class="body">Signing Boundary</text>
      
  <rect x="890" y="110" width="240" height="130" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="1010" y="142" text-anchor="middle" class="title">4. 직접 문서화</text>
  <text x="1010" y="172" text-anchor="middle" class="body">wallet-deposit</text>
<text x="1010" y="194" text-anchor="middle" class="body">withdrawal.md</text>
      
  <line x1="290" y1="175" x2="330" y2="175" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="570" y1="175" x2="610" y2="175" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="850" y1="175" x2="890" y2="175" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      <text x="50" y="300" class="note">목표: 코드를 먼저 늘리기 전에 돈의 방향, 상태, 보안 경계를 말로 설명할 수 있게 만든다.</text>
    
