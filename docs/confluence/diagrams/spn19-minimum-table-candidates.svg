<line x1="265" y1="174" x2="300" y2="174" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="390" y1="203" x2="300" y2="250" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="175" y1="203" x2="245" y2="250" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>


<rect x="575" y="88" width="475" height="270" rx="18" fill="#ffffff" stroke="#d97706" stroke-width="1.6"/>
