<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Minimum Table Candidates For Ledger And Settlement</title>
  <desc id="desc">Minimum Table Candidates For Ledger And Settlement diagram for SPN-19 Day 2 Ledger and Settlement learning</desc>
  <defs>
