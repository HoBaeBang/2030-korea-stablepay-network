    </filter>
  </defs>
  <rect x="0" y="0" width="1100" height="430" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#0f172a">Minimum Table Candidates For Ledger And Settlement</text>
  
<rect x="45" y="88" width="475" height="270" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
