<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 32px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 16px; fill: #cbd5e1; }
      .box-title { font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 21px; font-weight: 700; fill: #f8fafc; }
      .box-line { font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 16px; fill: #cbd5e1; }
      .footer { font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 16px; fill: #e2e8f0; }
      .arrow { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#0f172a"/>
  <rect x="32" y="32" width="1376" height="836" rx="28" fill="#111827" stroke="#1f2937" stroke-width="2"/>

  <text x="60" y="72" class="title">Day11 Backend Core에서 Ledger로 넘어가는 준비도</text>
  <text x="62" y="102" class="subtitle">공통 기반이 준비되어야 돈의 이동 기록을 안전하게 구현할 수 있다</text>

  <g filter="url(#shadow)">
    <rect x="80" y="162" width="250" height="158" rx="14" fill="#172554" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="98" y="196" class="box-title">공통 에러</text>
    <text x="98" y="226" class="box-line">bad_request</text>
    <text x="98" y="250" class="box-line">not_found</text>
    <text x="98" y="274" class="box-line">conflict</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="162" width="250" height="158" rx="14" fill="#052e2b" stroke="#34d399" stroke-width="2.5"/>
    <text x="438" y="196" class="box-title">검증 책임</text>
    <text x="438" y="226" class="box-line">Handler 형식</text>
    <text x="438" y="250" class="box-line">Service 규칙</text>
    <text x="438" y="274" class="box-line">Repository 저장</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="162" width="250" height="158" rx="14" fill="#431407" stroke="#fb923c" stroke-width="2.5"/>
    <text x="778" y="196" class="box-title">설정/시작</text>
    <text x="778" y="226" class="box-line">Config</text>
    <text x="778" y="250" class="box-line">DB 연결</text>
    <text x="778" y="274" class="box-line">Route 조립</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1100" y="162" width="250" height="158" rx="14" fill="#2e1065" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1118" y="196" class="box-title">로그/테스트</text>
    <text x="1118" y="226" class="box-line">상태 변경 로그</text>
    <text x="1118" y="250" class="box-line">service test</text>
    <text x="1118" y="274" class="box-line">handler test</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="250" y="522" width="280" height="178" rx="14" fill="#1f2937" stroke="#94a3b8" stroke-width="2.5"/>
    <text x="268" y="556" class="box-title">Ledger Entry</text>
    <text x="268" y="586" class="box-line">debit</text>
    <text x="268" y="610" class="box-line">credit</text>
    <text x="268" y="634" class="box-line">idempotency key</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="522" width="280" height="178" rx="14" fill="#450a0a" stroke="#f87171" stroke-width="2.5"/>
    <text x="638" y="556" class="box-title">Ledger Transaction</text>
    <text x="638" y="586" class="box-line">합계 0</text>
    <text x="638" y="610" class="box-line">한 거래 묶음</text>
    <text x="638" y="634" class="box-line">원장 기록</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="522" width="280" height="178" rx="14" fill="#052e2b" stroke="#34d399" stroke-width="2.5"/>
    <text x="1008" y="556" class="box-title">다음 Sprint</text>
    <text x="1008" y="586" class="box-line">Ledger Core</text>
    <text x="1008" y="610" class="box-line">Settlement</text>
    <text x="1008" y="634" class="box-line">Indexer 연결</text>
  </g>

  <path d="M330 241 L420 241" class="arrow"/>
  <path d="M670 241 L760 241" class="arrow"/>
  <path d="M1010 241 L1100 241" class="arrow"/>

  <path d="M205 320 L390 522" class="arrow"/>
  <path d="M545 320 L390 522" class="arrow"/>
  <path d="M885 320 L760 522" class="arrow"/>
  <path d="M1225 320 L1130 522" class="arrow"/>
  <path d="M530 611 L620 611" class="arrow"/>
  <path d="M900 611 L990 611" class="arrow"/>

  <rect x="80" y="790" width="1280" height="54" rx="14" fill="#020617" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="824" class="footer">핵심: Ledger는 새로운 기능이지만, 성공 조건은 Day8~10의 공통 기반을 얼마나 잘 준비했는지에 달려 있다.</text>
</svg>
