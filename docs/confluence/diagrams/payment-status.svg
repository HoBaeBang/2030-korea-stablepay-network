<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" role="img" aria-labelledby="title desc">
  <title id="title">Payment Status Transition</title>
  <desc id="desc">Payment Status Transition diagram for 2030 KOREA StablePay Network documentation</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="900" height="330" rx="0" fill="#f8fafc"/>
  <text x="36" y="46" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#0f172a">Payment Status Transition</text>
  
<rect x="65" y="125" width="140" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="135" y="160" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">PENDING</text>
<rect x="270" y="125" width="190" height="70" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
<text x="365" y="160" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">ONCHAIN_DETECTED</text>
<rect x="525" y="125" width="140" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="595" y="160" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">FINALIZED</text>
<rect x="730" y="125" width="120" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="790" y="160" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">SETTLED</text>
<rect x="390" y="245" width="140" height="58" rx="10" fill="#ffe4e6" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
<text x="460" y="274" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">FAILED</text>
<line x1="205" y1="160" x2="270" y2="160" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="460" y1="160" x2="525" y2="160" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="665" y1="160" x2="730" y2="160" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="135" y1="195" x2="390" y2="260" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="365" y1="195" x2="430" y2="245" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>


</svg>
