<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="270" viewBox="0 0 850 270" role="img" aria-labelledby="title desc">
  <title id="title">Current Implementation And Future Scope</title>
  <desc id="desc">Current Implementation And Future Scope diagram for 2030 KOREA StablePay Network documentation</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="850" height="270" rx="0" fill="#f8fafc"/>
  <text x="36" y="46" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#0f172a">Current Implementation And Future Scope</text>
  
<rect x="60" y="115" width="190" height="78" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="155" y="144" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">현재 구현됨</text>
<text x="155" y="166" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">Merchant / Invoice / Payment</text>
<rect x="330" y="115" width="190" height="78" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
<text x="425" y="144" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">아직 미구현</text>
<text x="425" y="166" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">RPC / Ledger / Settlement</text>
<rect x="600" y="115" width="190" height="78" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="695" y="144" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">미래 확장</text>
<text x="695" y="166" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">Wallet / Rust Signer</text>
<line x1="250" y1="154" x2="330" y2="154" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

<line x1="520" y1="154" x2="600" y2="154" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>


</svg>
