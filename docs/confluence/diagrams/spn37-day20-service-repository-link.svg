<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #121a2a; stroke: #34445f; stroke-width: 2; }
      .title { fill: #eef4ff; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 46px; font-weight: 800; }
      .subtitle { fill: #aab8cc; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 24px; font-weight: 600; }
      .boxText { fill: #eef4ff; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 34px; font-weight: 800; }
      .small { fill: #c8d6ea; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 22px; font-weight: 600; }
      .muted { fill: #8292aa; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 18px; font-weight: 600; }
      .blue { fill: #172336; stroke: #38bdf8; stroke-width: 3; }
      .green { fill: #14263a; stroke: #22c55e; stroke-width: 3; }
      .orange { fill: #1e293b; stroke: #f59e0b; stroke-width: 3; }
      .purple { fill: #172554; stroke: #818cf8; stroke-width: 3; }
      .red { fill: #1b2334; stroke: #f43f5e; stroke-width: 3; }
      .line { stroke: #718096; stroke-width: 6; stroke-linecap: round; }
      .arrow { fill: #718096; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1500" />
  <rect class="panel" x="70" y="70" width="1060" height="1360" rx="28" />

  <text x="130" y="135" class="title">Day20 Service와 Repository 연결</text>
  <text x="130" y="180" class="subtitle">검증된 Ledger만 저장소로 넘기는 Service 유스케이스</text>

  <rect class="blue" x="180" y="250" width="840" height="125" rx="16" />
  <text x="245" y="310" class="boxText">1. RecordTransaction 요청</text>
  <text x="245" y="345" class="small">tx + entries를 Service로 전달한다</text>

  <line class="line" x1="600" y1="380" x2="600" y2="430" />
  <polygon class="arrow" points="600,465 580,425 620,425" />

  <rect class="green" x="180" y="470" width="840" height="135" rx="16" />
  <text x="245" y="530" class="boxText">2. ValidateTransaction</text>
  <text x="245" y="565" class="small">debit / credit 균형, 금액, 통화, 방향을 검증한다</text>

  <line class="line" x1="600" y1="610" x2="600" y2="665" />
  <polygon class="arrow" points="600,700 580,660 620,660" />

  <rect class="red" x="180" y="705" width="840" height="125" rx="16" />
  <text x="245" y="765" class="boxText">3. 검증 실패 시 중단</text>
  <text x="245" y="800" class="small">Repository를 호출하지 않고 에러를 반환한다</text>

  <line class="line" x1="600" y1="835" x2="600" y2="890" />
  <polygon class="arrow" points="600,925 580,885 620,885" />

  <rect class="orange" x="180" y="930" width="840" height="145" rx="16" />
  <text x="245" y="990" class="boxText">4. Store interface 호출</text>
  <text x="245" y="1025" class="small">Service는 Repository 구현체가 아니라 저장 동작만 안다</text>
  <text x="245" y="1055" class="small">CreateTransaction(ctx, tx, entries)</text>

  <line class="line" x1="600" y1="1080" x2="600" y2="1135" />
  <polygon class="arrow" points="600,1170 580,1130 620,1130" />

  <rect class="purple" x="180" y="1175" width="840" height="125" rx="16" />
  <text x="245" y="1235" class="boxText">5. Repository 저장</text>
  <text x="245" y="1270" class="small">DB transaction으로 ledger_transactions + entries 저장</text>

  <text x="130" y="1385" class="muted">SPN-37 | Ledger Service와 Repository 연결</text>
</svg>
