<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="520" viewBox="0 0 1260 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 13px Arial, sans-serif; fill: #334155; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">Blockchain Event Indexer Runtime Layer</text>
  
      <rect x="40" y="95" width="360" height="310" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="70" y="130" class="title">On-chain World</text>
      
  <rect x="80" y="160" width="130" height="95" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="191" text-anchor="middle" class="title">Block</text>
  <text x="145" y="216" text-anchor="middle" class="body">height</text>
<text x="145" y="238" text-anchor="middle" class="body">timestamp</text>
      
  <rect x="240" y="160" width="130" height="95" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="305" y="191" text-anchor="middle" class="title">Tx</text>
  <text x="305" y="216" text-anchor="middle" class="body">hash</text>
<text x="305" y="238" text-anchor="middle" class="body">status</text>
      
  <rect x="160" y="285" width="150" height="80" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="235" y="316" text-anchor="middle" class="title">Event / Log</text>
  <text x="235" y="341" text-anchor="middle" class="body">Transfer</text>
<text x="235" y="363" text-anchor="middle" class="body">to / amount</text>

      <rect x="480" y="95" width="340" height="310" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="510" y="130" class="title">Off-chain Worker Layer</text>
      
  <rect x="520" y="160" width="240" height="95" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="640" y="191" text-anchor="middle" class="title">Event Indexer</text>
  <text x="640" y="216" text-anchor="middle" class="body">polling / subscription</text>
<text x="640" y="238" text-anchor="middle" class="body">parse / validate</text>
      
  <rect x="520" y="285" width="240" height="80" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="640" y="316" text-anchor="middle" class="title">Checkpoint</text>
  <text x="640" y="341" text-anchor="middle" class="body">last_processed_height</text>
<text x="640" y="363" text-anchor="middle" class="body">retry cursor</text>

      <rect x="900" y="95" width="320" height="310" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <text x="930" y="130" class="title">StablePay Backend DB</text>
      
  <rect x="940" y="160" width="210" height="80" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="1045" y="191" text-anchor="middle" class="title">Deposits</text>
  <text x="1045" y="216" text-anchor="middle" class="body">tx_hash</text>
<text x="1045" y="238" text-anchor="middle" class="body">status</text>
      
  <rect x="940" y="265" width="210" height="80" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="1045" y="296" text-anchor="middle" class="title">Payments / Ledger</text>
  <text x="1045" y="321" text-anchor="middle" class="body">ONCHAIN_DETECTED</text>
<text x="1045" y="343" text-anchor="middle" class="body">FINALIZED</text>

      
  <line x1="400" y1="215" x2="520" y2="215" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="460" y="205" text-anchor="middle" class="label">RPC read</text>
      
  <line x1="760" y1="215" x2="940" y2="200" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="850" y="197.5" text-anchor="middle" class="label">save event</text>
      
  <line x1="760" y1="325" x2="940" y2="305" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="850" y="305" text-anchor="middle" class="label">update state</text>
      <text x="40" y="460" class="note">Event Indexer는 블록체인 내부가 아니라 우리 백엔드의 별도 worker 프로세스로 실행된다.</text>
      <text x="40" y="487" class="small">초기 구현은 polling이 현실적이고, 이후 WebSocket subscription + backfill/reconciliation으로 확장할 수 있다.</text>
    
</svg>