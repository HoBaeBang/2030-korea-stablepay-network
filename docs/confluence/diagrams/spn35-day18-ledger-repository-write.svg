<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="1500" fill="#0b1220"/>
  <rect x="70" y="60" width="1060" height="1380" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>

  <text x="130" y="135" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="40" font-weight="700">Day18 Ledger Repository 저장 구현</text>
  <text x="130" y="180" fill="#94a3b8" font-family="Arial, sans-serif" font-size="23">Transaction 1건과 Entry 여러 건을 하나의 DB transaction으로 저장하는 흐름</text>

  <rect x="180" y="245" width="840" height="105" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="295" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="30" font-weight="700">1. Service 검증 완료</text>
  <text x="250" y="328" fill="#bae6fd" font-family="Arial, sans-serif" font-size="21">debit / credit 균형 검증이 끝난 Entry를 저장 대상으로 넘긴다</text>

  <line x1="600" y1="350" x2="600" y2="405" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="180" y="410" width="840" height="105" rx="18" fill="#1f2937" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="460" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="30" font-weight="700">2. Repository 진입</text>
  <text x="250" y="493" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="21">CreateTransaction(ctx, tx, entries)를 호출한다</text>

  <line x1="600" y1="515" x2="600" y2="570" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="180" y="575" width="840" height="105" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="625" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">3. BeginTx</text>
  <text x="250" y="658" fill="#fde68a" font-family="Arial, sans-serif" font-size="21">여러 INSERT를 하나의 저장 묶음으로 시작한다</text>

  <line x1="600" y1="680" x2="600" y2="735" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="180" y="740" width="840" height="125" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="250" y="793" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="30" font-weight="700">4. ledger_transactions INSERT</text>
  <text x="250" y="827" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="21">비즈니스 사건 1건을 transaction row로 저장한다</text>
  <text x="250" y="855" fill="#93c5fd" font-family="Arial, sans-serif" font-size="19">reference_type / reference_id / idempotency_key</text>

  <line x1="600" y1="865" x2="600" y2="920" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="180" y="925" width="840" height="125" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="250" y="978" fill="#ecfeff" font-family="Arial, sans-serif" font-size="30" font-weight="700">5. ledger_entries INSERT</text>
  <text x="250" y="1012" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="21">돈의 이동 여러 줄을 loop로 저장한다</text>
  <text x="250" y="1040" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="19">transaction_id / account_id / direction / amount / currency</text>

  <line x1="600" y1="1050" x2="600" y2="1105" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="180" y="1110" width="840" height="105" rx="18" fill="#1f2937" stroke="#f43f5e" stroke-width="2"/>
  <text x="250" y="1160" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">6. Commit</text>
  <text x="250" y="1193" fill="#fecdd3" font-family="Arial, sans-serif" font-size="21">모든 INSERT가 성공하면 전체 저장을 확정한다</text>

  <rect x="180" y="1265" width="840" height="95" rx="18" fill="#172554" stroke="#818cf8" stroke-width="2"/>
  <text x="250" y="1318" fill="#e0e7ff" font-family="Arial, sans-serif" font-size="26" font-weight="700">중간 실패 시 rollback되어 transaction과 entries가 함께 취소된다</text>

  <text x="130" y="1402" fill="#64748b" font-family="Arial, sans-serif" font-size="20">SPN-35  |  Ledger Repository 저장 구현</text>
</svg>
