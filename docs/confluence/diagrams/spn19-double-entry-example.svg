<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Double-entry Ledger Example</title>
  <desc id="desc">Double-entry Ledger Example diagram for SPN-19 Day 2 Ledger and Settlement learning</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1040" height="420" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#0f172a">Double-entry Ledger Example</text>
  
<rect x="50" y="85" width="940" height="285" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
<text x="72" y="119" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#16a34a">고객이 10 USDC를 결제했을 때 원장 기록 예시</text>
<rect x="90" y="155" width="210" height="70" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
<text x="195" y="180" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">Customer Account</text>
<text x="195" y="202" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">-10 USDC</text>
<rect x="415" y="155" width="210" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
<text x="520" y="180" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">Merchant Pending</text>
<text x="520" y="202" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">+10 USDC</text>
<rect x="740" y="155" width="210" height="70" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
<text x="845" y="180" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">Ledger Transaction</text>
<text x="845" y="202" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="650" fill="#0f172a">합계 = 0</text>
<line x1="300" y1="190" x2="415" y2="190" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="357.5" y="181" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">same transaction</text>
<line x1="625" y1="190" x2="740" y2="190" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="682.5" y="181" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">balanced</text>
<text x="90" y="285" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="#0f172a">핵심: 한쪽 계정에서 빠진 금액은 다른 계정에 같은 금액으로 들어가야 합니다.</text>
<text x="90" y="315" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="#0f172a">그래야 중복 처리, 장애 복구, 정산 검증 시 돈의 흐름을 추적할 수 있습니다.</text>

</svg>