<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #121a2a; stroke: #34445f; stroke-width: 2; }
      .title { fill: #eef4ff; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 48px; font-weight: 800; }
      .subtitle { fill: #aab8cc; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 25px; font-weight: 600; }
      .boxText { fill: #eef4ff; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 34px; font-weight: 800; }
      .small { fill: #c8d6ea; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 22px; font-weight: 600; }
      .muted { fill: #8292aa; font-family: Arial, 'Apple SD Gothic Neo', sans-serif; font-size: 18px; font-weight: 600; }
      .blue { fill: #172336; stroke: #38bdf8; stroke-width: 3; }
      .green { fill: #14263a; stroke: #22c55e; stroke-width: 3; }
      .orange { fill: #1e293b; stroke: #f59e0b; stroke-width: 3; }
      .red { fill: #1b2334; stroke: #f43f5e; stroke-width: 3; }
      .purple { fill: #172554; stroke: #818cf8; stroke-width: 3; }
      .line { stroke: #718096; stroke-width: 6; stroke-linecap: round; }
      .arrow { fill: #718096; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1500" />
  <rect class="panel" x="70" y="70" width="1060" height="1360" rx="28" />

  <text x="130" y="135" class="title">Day19 Repository 저장 검증</text>
  <text x="130" y="180" class="subtitle">정상 저장, 중복 방지, rollback을 실제 DB 기준으로 확인한다</text>

  <rect class="blue" x="180" y="250" width="840" height="120" rx="16" />
  <text x="245" y="310" class="boxText">1. Day18 저장 메서드</text>
  <text x="245" y="345" class="small">CreateTransaction(ctx, tx, entries)</text>

  <line class="line" x1="600" y1="375" x2="600" y2="430" />
  <polygon class="arrow" points="600,465 580,425 620,425" />

  <rect class="green" x="180" y="470" width="840" height="135" rx="16" />
  <text x="245" y="530" class="boxText">2. 정상 저장 검증</text>
  <text x="245" y="565" class="small">ledger_transactions 1 row + ledger_entries N rows</text>

  <line class="line" x1="600" y1="610" x2="600" y2="665" />
  <polygon class="arrow" points="600,700 580,660 620,660" />

  <rect class="orange" x="180" y="705" width="840" height="145" rx="16" />
  <text x="245" y="765" class="boxText">3. Idempotency 중복 검증</text>
  <text x="245" y="800" class="small">같은 idempotency_key는 unique index로 실패한다</text>
  <text x="245" y="830" class="small">예: payment:pay_123:finalized</text>

  <line class="line" x1="600" y1="855" x2="600" y2="910" />
  <polygon class="arrow" points="600,945 580,905 620,905" />

  <rect class="red" x="180" y="950" width="840" height="145" rx="16" />
  <text x="245" y="1010" class="boxText">4. Foreign Key 실패 검증</text>
  <text x="245" y="1045" class="small">존재하지 않는 account_id로 entry 저장 실패</text>
  <text x="245" y="1075" class="small">실패 후 transaction row도 rollback되어야 한다</text>

  <line class="line" x1="600" y1="1100" x2="600" y2="1155" />
  <polygon class="arrow" points="600,1190 580,1150 620,1150" />

  <rect class="purple" x="180" y="1195" width="840" height="120" rx="16" />
  <text x="245" y="1255" class="boxText">5. Day20 연결 준비</text>
  <text x="245" y="1290" class="small">ValidateTransaction -> CreateTransaction 흐름으로 확장</text>

  <text x="130" y="1385" class="muted">SPN-36 | Repository 저장 검증과 Idempotency</text>
</svg>
