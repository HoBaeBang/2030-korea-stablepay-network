<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="280" viewBox="0 0 1040 280" role="img" aria-labelledby="title desc">
  <title id="title">SPN-19 Day 2 Learning Flow</title>
  <desc id="desc">SPN-19 Day 2 Learning Flow diagram for SPN-19 Day 2 Ledger and Settlement learning</desc>
  <defs>
