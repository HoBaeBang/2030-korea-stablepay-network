<line x1="225" y1="151" x2="285" y2="151" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="255" y="142" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">FINALIZED 이후</text>
