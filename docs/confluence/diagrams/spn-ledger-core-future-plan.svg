<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#78A9FF"/>
    </marker>
    <style>
      .title{font:700 48px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#F4F7FB}
      .sub{font:400 22px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#A9B4C4}
      .day{font:700 26px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#F4F7FB}
      .topic{font:600 23px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#DDE6F3}
      .desc{font:400 19px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#A9B4C4}
      .label{font:700 20px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;fill:#7DD3FC}
    </style>
  </defs>
  <rect width="1400" height="1400" fill="#0B1018"/>
  <rect x="56" y="48" width="1288" height="1304" rx="28" fill="#111926" stroke="#263448" stroke-width="2"/>

  <text x="100" y="125" class="title">Ledger Core 압축 일정</text>
  <text x="100" y="168" class="sub">구현 흐름은 유지하고, 복습은 각 Day의 마지막 검증에 포함합니다.</text>

  <text x="100" y="235" class="label">완료된 기반</text>
  <g filter="url(#shadow)">
    <rect x="100" y="265" width="280" height="160" rx="16" fill="#172233" stroke="#3B82F6" stroke-width="2"/>
    <rect x="405" y="265" width="280" height="160" rx="16" fill="#172233" stroke="#3B82F6" stroke-width="2"/>
    <rect x="710" y="265" width="280" height="160" rx="16" fill="#172233" stroke="#3B82F6" stroke-width="2"/>
    <rect x="1015" y="265" width="280" height="160" rx="16" fill="#172233" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <text x="130" y="310" class="day">Day18</text><text x="130" y="350" class="topic">Repository 저장</text><text x="130" y="385" class="desc">Transaction + Entries</text>
  <text x="435" y="310" class="day">Day19</text><text x="435" y="350" class="topic">저장 안전성</text><text x="435" y="385" class="desc">Idempotency · Rollback</text>
  <text x="740" y="310" class="day">Day20</text><text x="740" y="350" class="topic">Service 연결</text><text x="740" y="385" class="desc">검증 후 Repository 저장</text>
  <text x="1045" y="310" class="day">Day21</text><text x="1045" y="350" class="topic">Payment 연결</text><text x="1045" y="385" class="desc">FINALIZED → Ledger</text>
  <path d="M380 345 H395 M685 345 H700 M990 345 H1005" stroke="#78A9FF" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="100" y="500" class="label">현재 작업</text>
  <g filter="url(#shadow)"><rect x="100" y="530" width="1195" height="190" rx="18" fill="#172C2A" stroke="#34D399" stroke-width="3"/></g>
  <text x="145" y="580" class="day">Day22</text>
  <text x="145" y="625" class="topic">Settlement 도메인 타입과 계산 서비스</text>
  <text x="145" y="667" class="desc">MerchantPending CREDIT 후보 → Batch + Items 계산 · 검증 · 단위 테스트</text>

  <text x="100" y="795" class="label">다음 구현 흐름</text>
  <g filter="url(#shadow)">
    <rect x="100" y="825" width="350" height="180" rx="16" fill="#1A2230" stroke="#A78BFA" stroke-width="2"/>
    <rect x="525" y="825" width="350" height="180" rx="16" fill="#1A2230" stroke="#A78BFA" stroke-width="2"/>
    <rect x="950" y="825" width="345" height="180" rx="16" fill="#1A2230" stroke="#A78BFA" stroke-width="2"/>
    <rect x="310" y="1080" width="350" height="180" rx="16" fill="#1A2230" stroke="#A78BFA" stroke-width="2"/>
    <rect x="740" y="1080" width="350" height="180" rx="16" fill="#1A2230" stroke="#A78BFA" stroke-width="2"/>
  </g>
  <text x="130" y="875" class="day">Day23</text><text x="130" y="917" class="topic">Settlement DB · 상태</text><text x="130" y="955" class="desc">Migration · Repository · 전이</text>
  <text x="555" y="875" class="day">Day24</text><text x="555" y="917" class="topic">Reconciliation</text><text x="555" y="955" class="desc">DB · Ledger 비교와 검증</text>
  <text x="980" y="875" class="day">Day25</text><text x="980" y="917" class="topic">Deposit · Event</text><text x="980" y="955" class="desc">입금과 중복 이벤트 방지</text>
  <text x="340" y="1130" class="day">Day26</text><text x="340" y="1172" class="topic">Indexer · Withdrawal</text><text x="340" y="1210" class="desc">Polling과 출금 흐름</text>
  <text x="770" y="1130" class="day">Day27</text><text x="770" y="1172" class="topic">Signer · Portfolio</text><text x="770" y="1210" class="desc">보안 경계와 Phase 2 정리</text>
  <path d="M450 915 H515 M875 915 H940 M1122 1005 V1040 H660 V1070 M660 1170 H730" fill="none" stroke="#78A9FF" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
