<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="500" viewBox="0 0 1260 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px Arial, sans-serif; fill: #334155; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">Wallet / Key Security Boundary</text>
  
      <rect x="40" y="95" width="500" height="300" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
      <text x="70" y="130" class="title">Go Payment Backend</text>
      
  <rect x="80" y="160" width="180" height="95" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="170" y="192" text-anchor="middle" class="title">API Server</text>
  <text x="170" y="222" text-anchor="middle" class="body">출금 요청 수신</text>
<text x="170" y="244" text-anchor="middle" class="body">사용자/권한 검증</text>
      
  <rect x="310" y="160" width="180" height="95" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="400" y="192" text-anchor="middle" class="title">Policy + DB</text>
  <text x="400" y="222" text-anchor="middle" class="body">잔액/한도 확인</text>
<text x="400" y="244" text-anchor="middle" class="body">상태 저장</text>
      
  <line x1="260" y1="207" x2="310" y2="207" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      <text x="70" y="330" class="small">Go 서버는 private key를 직접 보관하거나 평문으로 읽지 않는다.</text>

      <rect x="690" y="95" width="400" height="300" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <text x="720" y="130" class="title">Rust Signer Boundary</text>
      
  <rect x="735" y="160" width="150" height="95" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <text x="810" y="192" text-anchor="middle" class="title">Signer API</text>
  <text x="810" y="222" text-anchor="middle" class="body">제한된 서명</text>
<text x="810" y="244" text-anchor="middle" class="body">요청만 허용</text>
      
  <rect x="915" y="160" width="130" height="95" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="980" y="192" text-anchor="middle" class="title">Key Store</text>
  <text x="980" y="222" text-anchor="middle" class="body">Private Key</text>
<text x="980" y="244" text-anchor="middle" class="body">격리 보관</text>
      
  <line x1="885" y1="207" x2="915" y2="207" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      <text x="720" y="330" class="small">서명 권한은 작고 명확한 컴포넌트 안에 가둔다.</text>

      
  <rect x="1110" y="185" width="110" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="1165" y="217" text-anchor="middle" class="title">Blockchain</text>
  <text x="1165" y="247" text-anchor="middle" class="body">Broadcast</text>
<text x="1165" y="269" text-anchor="middle" class="body">by Go</text>
      
  <line x1="490" y1="207" x2="735" y2="207" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="612.5" y="197" text-anchor="middle" class="label">sign request</text>
      
  <line x1="735" y1="255" x2="490" y2="255" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="612.5" y="245" text-anchor="middle" class="label">signed tx</text>
      
  <line x1="490" y1="285" x2="1110" y2="245" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="805" y="300" text-anchor="middle" class="label">Go backend broadcasts signed tx</text>
  
      <text x="40" y="450" class="note">Signer는 private key와 서명을 담당하고, Go 백엔드는 signed tx 저장, broadcast, 상태 추적을 담당한다.</text>
    
</svg>
