<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="540" viewBox="0 0 1260 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 14px Arial, sans-serif; fill: #334155; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">Withdrawal State Flow</text>
  
      
  <rect x="40" y="145" width="170" height="100" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="125" y="177" text-anchor="middle" class="title">REQUESTED</text>
  <text x="125" y="207" text-anchor="middle" class="body">사용자가</text>
<text x="125" y="229" text-anchor="middle" class="body">출금 요청</text>
      
  <rect x="250" y="145" width="170" height="100" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="335" y="177" text-anchor="middle" class="title">APPROVED</text>
  <text x="335" y="207" text-anchor="middle" class="body">정책 검증</text>
<text x="335" y="229" text-anchor="middle" class="body">승인 완료</text>
      
  <rect x="460" y="145" width="170" height="100" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="545" y="177" text-anchor="middle" class="title">SIGNED</text>
  <text x="545" y="207" text-anchor="middle" class="body">Transaction</text>
<text x="545" y="229" text-anchor="middle" class="body">서명 완료</text>
      
  <rect x="670" y="145" width="190" height="100" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="765" y="177" text-anchor="middle" class="title">BROADCASTED</text>
  <text x="765" y="207" text-anchor="middle" class="body">네트워크에</text>
<text x="765" y="229" text-anchor="middle" class="body">전송 완료</text>
      
  <rect x="900" y="145" width="170" height="100" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="985" y="177" text-anchor="middle" class="title">CONFIRMED</text>
  <text x="985" y="207" text-anchor="middle" class="body">온체인</text>
<text x="985" y="229" text-anchor="middle" class="body">확정 완료</text>
      
  <rect x="1090" y="145" width="130" height="100" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="1155" y="177" text-anchor="middle" class="title">CLOSED</text>
  <text x="1155" y="207" text-anchor="middle" class="body">내부 처리</text>
<text x="1155" y="229" text-anchor="middle" class="body">종료</text>
      
  <line x1="210" y1="195" x2="250" y2="195" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="420" y1="195" x2="460" y2="195" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="630" y1="195" x2="670" y2="195" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="860" y1="195" x2="900" y2="195" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <line x1="1070" y1="195" x2="1090" y2="195" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  
      
  <rect x="250" y="315" width="170" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="335" y="347" text-anchor="middle" class="title">CANCELED</text>
  <text x="335" y="377" text-anchor="middle" class="body">승인 전 취소</text>
      
  <rect x="670" y="315" width="190" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="765" y="347" text-anchor="middle" class="title">FAILED</text>
  <text x="765" y="377" text-anchor="middle" class="body">전송/확정 실패</text>
<text x="765" y="399" text-anchor="middle" class="body">재시도 판단</text>
      
  <line x1="335" y1="245" x2="335" y2="315" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="335" y="270" text-anchor="middle" class="label">cancel</text>
      
  <line x1="765" y1="245" x2="765" y2="315" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="765" y="270" text-anchor="middle" class="label">fail</text>
      <text x="40" y="470" class="note">출금은 자산이 밖으로 나가는 흐름이라 승인, 서명, 전송, 확정 상태를 분리해서 추적해야 한다.</text>
      <text x="40" y="497" class="small">핵심: 같은 출금 요청이 두 번 서명되거나 두 번 전송되지 않도록 idempotency와 상태 전이가 필요하다.</text>
    
</svg>