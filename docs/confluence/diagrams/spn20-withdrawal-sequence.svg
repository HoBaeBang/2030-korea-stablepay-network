<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="720" viewBox="0 0 1380 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .actor { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 13px Arial, sans-serif; fill: #334155; }
      .step { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">Withdrawal Sequence</text>
  
  
  <rect x="35" y="90" width="160" height="72" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="115" y="120" text-anchor="middle" class="actor">사용자</text>
  <text x="115" y="144" text-anchor="middle" class="body">출금 요청</text>
  
  <rect x="235" y="90" width="180" height="72" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="325" y="120" text-anchor="middle" class="actor">Go API</text>
  <text x="325" y="144" text-anchor="middle" class="body">요청/상태 관리</text>
  
  <rect x="455" y="90" width="190" height="72" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="550" y="120" text-anchor="middle" class="actor">Policy + Ledger</text>
  <text x="550" y="144" text-anchor="middle" class="body">잔액/한도/예약</text>
  
  <rect x="685" y="90" width="180" height="72" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="775" y="120" text-anchor="middle" class="actor">Rust Signer</text>
  <text x="775" y="144" text-anchor="middle" class="body">transaction 서명</text>
  
  <rect x="905" y="90" width="190" height="72" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="1000" y="120" text-anchor="middle" class="actor">블록체인</text>
  <text x="1000" y="144" text-anchor="middle" class="body">broadcast / block</text>
  
  <rect x="1135" y="90" width="190" height="72" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1230" y="120" text-anchor="middle" class="actor">Confirmer</text>
  <text x="1230" y="144" text-anchor="middle" class="body">receipt/finality 확인</text>

  <line x1="115" y1="162" x2="115" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="325" y1="162" x2="325" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="550" y1="162" x2="550" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="775" y1="162" x2="775" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="1000" y1="162" x2="1000" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="1230" y1="162" x2="1230" y2="595" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="7 7"/>

  
  <line x1="115" y1="205" x2="325" y2="205" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="220" y="197" text-anchor="middle" class="step">1. 출금 요청</text>
  
  <line x1="325" y1="265" x2="550" y2="265" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="437.5" y="257" text-anchor="middle" class="step">2. 잔액/한도/주소/중복 검증</text>
  
  <line x1="550" y1="325" x2="325" y2="325" stroke="#475569" stroke-width="2.3" marker-start="url(#arrow)"/>
  <text x="437.5" y="317" text-anchor="middle" class="step">3. APPROVED + 금액 예약</text>
  
  <line x1="325" y1="385" x2="775" y2="385" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="550" y="377" text-anchor="middle" class="step">4. unsigned transaction 서명 요청</text>
  
  <line x1="775" y1="445" x2="325" y2="445" stroke="#475569" stroke-width="2.3" marker-start="url(#arrow)"/>
  <text x="550" y="437" text-anchor="middle" class="step">5. signed raw transaction 반환</text>
  
  <line x1="325" y1="505" x2="1000" y2="505" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="662.5" y="497" text-anchor="middle" class="step">6. signed transaction broadcast</text>
  
  <line x1="1230" y1="565" x2="1000" y2="565" stroke="#475569" stroke-width="2.3" marker-start="url(#arrow)"/>
  <text x="1115" y="557" text-anchor="middle" class="step">7. receipt / confirmation / finality 조회</text>
  
  <line x1="1230" y1="625" x2="550" y2="625" stroke="#475569" stroke-width="2.3" marker-start="url(#arrow)"/>
  <text x="890" y="617" text-anchor="middle" class="step">8. CONFIRMED 후 ledger 확정</text>

  <text x="35" y="685" class="note">SIGNED는 내부 원장 서명이 아니라, 블록체인 네트워크에 제출할 transaction을 private key로 서명했다는 뜻입니다.</text>

</svg>