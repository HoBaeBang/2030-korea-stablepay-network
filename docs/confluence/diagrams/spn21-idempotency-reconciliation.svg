<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="500" viewBox="0 0 1260 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .page-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 13px Arial, sans-serif; fill: #334155; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f766e; }
      .note { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="40" y="48" class="page-title">Idempotency and Reconciliation</text>
  
      
  <rect x="50" y="125" width="230" height="105" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="165" y="156" text-anchor="middle" class="title">Duplicate Event</text>
  <text x="165" y="181" text-anchor="middle" class="body">같은 tx_hash</text>
<text x="165" y="203" text-anchor="middle" class="body">같은 log_index</text>
      
  <rect x="340" y="125" width="250" height="105" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="465" y="156" text-anchor="middle" class="title">Idempotency Key</text>
  <text x="465" y="181" text-anchor="middle" class="body">chain + tx_hash</text>
<text x="465" y="203" text-anchor="middle" class="body">+ log_index</text>
      
  <rect x="650" y="125" width="250" height="105" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="775" y="156" text-anchor="middle" class="title">Single Effect</text>
  <text x="775" y="181" text-anchor="middle" class="body">DB에는 한 번만</text>
<text x="775" y="203" text-anchor="middle" class="body">Ledger도 한 번만</text>
      
  <line x1="280" y1="177" x2="340" y2="177" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  
      
  <line x1="590" y1="177" x2="650" y2="177" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  

      
  <rect x="120" y="310" width="260" height="95" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="341" text-anchor="middle" class="title">On-chain State</text>
  <text x="250" y="366" text-anchor="middle" class="body">실제 블록체인 상태</text>
<text x="250" y="388" text-anchor="middle" class="body">tx / event / finality</text>
      
  <rect x="520" y="310" width="260" height="95" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="650" y="341" text-anchor="middle" class="title">Reconciliation</text>
  <text x="650" y="366" text-anchor="middle" class="body">서로 맞는지 비교</text>
<text x="650" y="388" text-anchor="middle" class="body">누락/불일치 탐지</text>
      
  <rect x="920" y="310" width="230" height="95" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="1035" y="341" text-anchor="middle" class="title">Internal DB</text>
  <text x="1035" y="366" text-anchor="middle" class="body">deposit/payment</text>
<text x="1035" y="388" text-anchor="middle" class="body">ledger/checkpoint</text>
      
  <line x1="380" y1="357" x2="520" y2="357" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  
      
  <line x1="780" y1="357" x2="920" y2="357" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  
      <text x="50" y="455" class="note">Idempotency는 같은 이벤트의 중복 반영을 막고, Reconciliation은 온체인 상태와 내부 DB 상태가 어긋났는지 찾아낸다.</text>
    
</svg>