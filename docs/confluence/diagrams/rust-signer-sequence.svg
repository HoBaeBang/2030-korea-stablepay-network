<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">Rust Signer Sequence</title>
  <desc id="desc">Rust Signer Sequence diagram for 2030 KOREA StablePay Network documentation</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="900" height="380" rx="0" fill="#f8fafc"/>
  <text x="36" y="46" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700" fill="#0f172a">Rust Signer Sequence</text>
  
<line x1="160" y1="125" x2="160" y2="320" stroke="#94a3b8" stroke-dasharray="6 6"/>
<line x1="450" y1="125" x2="450" y2="320" stroke="#94a3b8" stroke-dasharray="6 6"/>
<line x1="740" y1="125" x2="740" y2="320" stroke="#94a3b8" stroke-dasharray="6 6"/>
<rect x="75" y="85" width="170" height="58" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
<text x="160" y="114" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">Go Backend</text>
<rect x="365" y="85" width="170" height="58" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="450" y="114" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">Rust Signer</text>
<rect x="655" y="85" width="170" height="58" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
<text x="740" y="114" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600" fill="#0f172a">Blockchain</text>
<line x1="160" y1="170" x2="450" y2="170" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="305" y="162" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">signing request</text>
<rect x="365" y="205" width="170" height="48" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="450" y="229" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="13" font-weight="600" fill="#0f172a">validate &amp; sign</text>
<line x1="450" y1="270" x2="160" y2="270" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="305" y="262" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">signed transaction</text>
<line x1="160" y1="315" x2="740" y2="315" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="450" y="307" text-anchor="middle" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="12" fill="#475569">broadcast transaction</text>

</svg>
