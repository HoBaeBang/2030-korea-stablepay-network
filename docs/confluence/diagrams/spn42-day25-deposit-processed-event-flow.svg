  <text x="80" y="120" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">같은 blockchain event가 여러 번 들어와도 processed_events로 중복을 막고, Deposit과 Ledger credit은 한 번만 만든다.</text>

