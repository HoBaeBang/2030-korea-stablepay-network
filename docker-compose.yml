services:
  postgres:
    image: postgres:16-alpine
    container_name: stablepay-postgres
    environment:
      POSTGRES_USER: stablepay
      POSTGRES_PASSWORD: stablepay
      POSTGRES_DB: stablepay
    ports:
      - "5432:5432"
    volumes:
      - stablepay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablepay -d stablepay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stablepay-postgres-data:
